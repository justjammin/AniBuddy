<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Background circle -->
  <rect width="40" height="40" rx="8" fill="#2B2D30"/>
  <!-- Terminal tab shape -->
  <rect x="4" y="10" width="32" height="22" rx="4" ry="4" fill="#1E1F22" stroke="#3574F0" stroke-width="1.5"/>
  <!-- Tab header bar -->
  <rect x="4" y="10" width="32" height="8" rx="4" ry="4" fill="#3574F0" opacity="0.15"/>
  <rect x="4" y="14" width="32" height="4" fill="#3574F0" opacity="0.15"/>
  <!-- CT text -->
  <text x="20" y="26" font-family="JetBrains Mono, monospace, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">CT</text>
  <!-- Tab highlight line at top -->
  <line x1="8" y1="10.75" x2="32" y2="10.75" stroke="#3574F0" stroke-width="1.5" stroke-linecap="round"/>
</svg>
