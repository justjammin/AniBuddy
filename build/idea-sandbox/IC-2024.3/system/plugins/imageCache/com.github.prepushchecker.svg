<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="url(#bg)"/>
  <!-- Upload / push arrow -->
  <line x1="19" y1="9" x2="19" y2="23" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polyline points="13,17 19,9 25,17" stroke="white" stroke-width="3" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="12" y="25" width="14" height="3.5" rx="1.75" fill="white"/>
  <!-- Green check badge (bottom-right) -->
  <circle cx="30" cy="31" r="9.5" fill="#388E3C"/>
  <polyline points="25.5,31 28.5,34.5 35,27.5" stroke="white" stroke-width="2.2" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
